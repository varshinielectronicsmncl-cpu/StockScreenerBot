import os
import requests

# GitHub Secrets నుండి మీ టోకెన్స్
BOT_TOKEN = os.environ.get("TELEGRAM_BOT_TOKEN")
CHAT_ID = os.environ.get("TELEGRAM_CHAT_ID")

def send_test_message():
    url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
    payload = {
        "chat_id": CHAT_ID,
        "text": "🟢 *TESTING SUCCESS!* \n\nనమస్కారం! మీ టెలిగ్రామ్ బాట్ పర్ఫెక్ట్‌గా పనిచేస్తోంది. కనెక్షన్ సక్సెస్! 🎉",
        "parse_mode": "Markdown"
    }
    
    try:
        # మెసేజ్ పంపుతున్నాం
        response = requests.post(url, data=payload)
        
        # రిజల్ట్ ప్రింట్ చేస్తున్నాం (గిట్‌హబ్‌లో చూడటానికి)
        print("Status Code:", response.status_code)
        print("Response:", response.text)
        
        if response.status_code == 200:
            print("✅ టెలిగ్రామ్‌కి మెసేజ్ విజయవంతంగా పంపబడింది!")
        else:
            print("❌ ఎర్రర్: మెసేజ్ వెళ్ళలేదు. మీ BOT_TOKEN లేదా CHAT_ID తప్పుగా ఉండి ఉండొచ్చు.")
            
    except Exception as e:
        print("Error:", e)

# ఫంక్షన్ రన్ చేయడం
send_test_message()
