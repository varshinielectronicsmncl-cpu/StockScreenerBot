name: Market Scanner Bot

on:
  schedule:
    # మార్కెట్ టైమ్స్: సోమ-శుక్ర (ఉదయం 9:30 - మధ్యాహ్నం 3:30 IST)
    # GitHub టైమ్ UTC లో ఉంటుంది, కాబట్టి దానికి తగ్గట్టు మార్చబడింది.
    - cron: '*/15 4-10 * * 1-5'
  workflow_dispatch: # మనం కావాలనుకున్నప్పుడు మ్యాన్యువల్ గా కూడా రన్ చేసుకోవడానికి

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Market Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
